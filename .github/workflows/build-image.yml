name: Build Docker image

# Fork-friendly image build: pushes a complete, self-contained Logto image
# (equivalent to svhd/logto) to this repo's GitHub Container Registry using the
# built-in GITHUB_TOKEN — no Docker Hub account or extra secrets required.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Image tag to publish
        required: false
        default: dev
  push:
    branches:
      - feat/step-up-auth-and-test-fixes

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute lowercase image name
        id: image
        run: echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image.outputs.name }}
          tags: |
            type=raw,value=${{ github.event.inputs.tag || 'dev' }}
            type=sha,format=short

      - name: Build and push image (amd64)
        uses: docker/build-push-action@v6
        with:
          platforms: linux/amd64
          context: .
          push: true
          build-args: |
            dev_features_enabled=false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image summary
        run: |
          {
            echo "## ✅ Logto image built & pushed"
            echo ""
            echo "Pull it with:"
            echo '```'
            echo "docker pull ${{ steps.image.outputs.name }}:${{ github.event.inputs.tag || 'dev' }}"
            echo '```'
            echo ""
            echo "Tags:"
            echo '${{ steps.meta.outputs.tags }}' | sed 's/^/- /'
          } >> "$GITHUB_STEP_SUMMARY"
