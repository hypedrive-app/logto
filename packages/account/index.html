<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />
  <meta name="theme-color" content="#e11d48" />
  <meta name="description" content="Manage your Hypedrive account — profile, security, sign-in methods, and connected devices." />
  <meta name="robots" content="noindex,nofollow" />
  <title>Account · Hypedrive</title>
  <script>
    /* See {@link packages/schemas/src/types/ssr.ts} */
    window.logtoSsr = "__LOGTO_ACCOUNT_CENTER_SSR__";
  </script>
</head>

<body>
  <script>
    // Keep this blocking script in the HTML so the theme, platform class, and brand color
    // are applied before React loads and the browser has a chance to paint the wrong UI.
    (function () {
      var theme = 'light';
      document.documentElement.setAttribute('data-theme', theme);
      var isMobile = navigator.userAgentData
        ? navigator.userAgentData.mobile
        : /Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent)
          || (/Macintosh/i.test(navigator.userAgent) && navigator.maxTouchPoints > 1);
      document.body.classList.add(isMobile ? 'mobile' : 'desktop');

      try {
        var ssr = window.logtoSsr;
        var darkOk = typeof ssr === 'object' && ssr !== null
          && ssr.signInExperience && ssr.signInExperience.data
          && ssr.signInExperience.data.color.isDarkModeEnabled;
        var prefersDark = typeof window.matchMedia === 'function'
          && window.matchMedia('(prefers-color-scheme: dark)').matches;
        theme = (darkOk && prefersDark) ? 'dark' : 'light';
        document.documentElement.setAttribute('data-theme', theme);
        // Hypedrive brand is a fixed neutral near-black — pin it before paint.
        // Also pin the static design-token primary + its contrast so the primary
        // button has correct (inverted) colours on the first frame in dark mode.
        var brand = theme === 'dark' ? '#fafafa' : '#0e1116';
        document.body.style.setProperty('--color-brand-default', brand);
        document.body.style.setProperty('--primary', brand);
        document.body.style.setProperty('--primary-contrast', theme === 'dark' ? '#0e1116' : '#ffffff');
        document.body.style.setProperty('--btn-edge', theme === 'dark' ? 'rgba(255,255,255,0)' : 'rgba(255,255,255,0.85)');
      } catch (e) { /* noop */ }
    })();
  </script>
  <noscript>You need to enable JavaScript to run this app.</noscript>
  <div id="app"></div>
  <script type="module">
    // Dev-only react-refresh preamble. We load the Vite-provided runtime dynamically so
    // production builds do not try to resolve /@react-refresh (which breaks rollup) while
    // still enabling HMR in development to avoid the “preamble not detected” error.
    if (import.meta.env.DEV) {
      const base = (import.meta.env.BASE_URL ?? '/').replace(/\/?$/, '/');
      const RefreshRuntimeModule = await import(`${base}@react-refresh`);
      const RefreshRuntime = RefreshRuntimeModule.default ?? RefreshRuntimeModule;
      RefreshRuntime.injectIntoGlobalHook(window);
      window.$RefreshReg$ = () => {};
      window.$RefreshSig$ = () => (type) => type;
      window.__vite_plugin_react_preamble_installed__ = true;
    }
  </script>
  <script type="module" src="src/index.tsx"></script>
</body>

</html>
