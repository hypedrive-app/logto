packages:
  - packages/*
  - packages/toolkit/*
  - packages/connectors/*
  - "!packages/connectors/templates"

allowBuilds:
  '@swc/core': true
  core-js: true
  esbuild: true
  puppeteer: true

# Single-version policy for cross-package dependencies.
# Packages should reference these via `"<dep>": "catalog:"`.
# See docs/modernization/05-supply-chain.md.
catalog:
  # Build / bundler
  vite: ^8.0.16
  "@vitejs/plugin-react": ^6.0.2
  # Language / toolchain
  typescript: ^5.9.3
  eslint: ^8.57.0
  prettier: ^3.5.3
  lint-staged: ^15.0.2
  # Runtime libs
  zod: ^4.4.3
  ky: ^2.0.2
  # Test
  nock: ^14.0.15
  vitest: ^4.1.9
  "@vitest/coverage-v8": ^4.1.9

minimumReleaseAgeExclude:
  - '@posthog/core@1.35.4'
  - posthog-js@1.392.0
  - '@aws-sdk/checksums@3.1000.8'
  - '@aws-sdk/client-s3@3.1075.0'
  - '@aws-sdk/core@3.974.23'
  - '@aws-sdk/credential-provider-env@3.972.49'
  - '@aws-sdk/credential-provider-http@3.972.51'
  - '@aws-sdk/credential-provider-ini@3.972.56'
  - '@aws-sdk/credential-provider-login@3.972.55'
  - '@aws-sdk/credential-provider-node@3.972.58'
  - '@aws-sdk/credential-provider-process@3.972.49'
  - '@aws-sdk/credential-provider-sso@3.972.55'
  - '@aws-sdk/credential-provider-web-identity@3.972.55'
  - '@aws-sdk/middleware-flexible-checksums@3.974.33'
  - '@aws-sdk/middleware-sdk-s3@3.972.54'
  - '@aws-sdk/nested-clients@3.997.23'
  - '@aws-sdk/token-providers@3.1074.0'
  - '@aws-sdk/xml-builder@3.972.31'
  - '@posthog/core@1.37.2'
  - '@posthog/types@1.391.1'
  - nanoid@5.1.16
  - posthog-js@1.393.4

# Dependency overrides (security pins) + peer rules.
# Moved here from root package.json's `pnpm` field: pnpm 11 no longer reads `pnpm.overrides`
# / `pnpm.peerDependencyRules` from package.json.
overrides:
  '@babel/core@<=7.29.0': '^7.29.6'
  '@opentelemetry/core@<2.8.0': '^2.8.0'
  '@smithy/config-resolver@<4.4.0': '^4.4.0'
  '@tootallnate/once@<3.0.1': '^3.0.1'
  '@xmldom/xmldom@<0.8.13': '^0.8.13'
  'ajv@<6.14.0': '^6.14.0'
  'ajv@>=7.0.0-alpha.0 <8.18.0': '^8.18.0'
  'axios@<1.15.2': '^1.15.2'
  'basic-ftp@<=5.2.2': '^5.3.0'
  'brace-expansion@<1.1.13': '^1.1.13'
  'brace-expansion@>=2.0.0 <2.0.3': '^2.0.3'
  'brace-expansion@>=4.0.0 <5.0.6': '^5.0.6'
  'cross-spawn@<6.0.6': '^6.0.6'
  'diff@>=6.0.0 <8.0.3': '^8.0.3'
  'dompurify@<3.4.9': '^3.4.9'
  'esbuild': '^0.25.0'
  'fast-xml-parser@>=4.0.0-beta.0 <5.5.7': '^5.5.7'
  'flatted@<=3.4.1': '^3.4.2'
  'follow-redirects@<=1.15.11': '^1.16.0'
  'form-data@<2.5.6': '^2.5.6'
  'form-data@>=4.0.0 <4.0.6': '^4.0.6'
  'formidable@<3.5.4': '^3.5.4'
  'http-proxy-middleware@>=3.0.4 <3.0.7': '^3.0.7'
  'immutable@>=4.0.0-rc.1 <4.3.8': '^4.3.8'
  'ip-address@<=10.1.0': '^10.1.1'
  'joi@<17.13.4': '^17.13.4'
  'js-yaml@>=4.0.0 <4.2.0': '^4.2.0'
  'koa@<2.16.4': '^2.16.4'
  'lodash@<=4.17.23': '^4.18.0'
  'lodash-es@<=4.17.23': '^4.18.0'
  'mermaid@<=10.9.5': '^10.9.6'
  'micromatch@<4.0.8': '^4.0.8'
  'minimatch@<3.1.4': '^3.1.4'
  'minimatch@>=5.0.0 <5.1.8': '^5.1.8'
  'minimatch@>=9.0.0 <9.0.7': '^9.0.7'
  'nanoid@>=4.0.0 <5.0.9': '^5.0.9'
  'node-forge@<1.4.0': '^1.4.0'
  'nodemailer@<=9.0.0': '^9.0.1'
  'path-to-regexp@>=8.0.0 <8.4.0': '^8.4.0'
  'picomatch@<2.3.2': '^2.3.2'
  'picomatch@>=4.0.0 <4.0.4': '^4.0.4'
  'playwright@<1.55.1': '^1.55.1'
  'postcss@<8.5.10': '^8.5.10'
  'prismjs@<1.30.0': '^1.30.0'
  'qs@>=6.11.1 <6.15.2': '^6.15.2'
  'react-router@>=6.7.0 <6.30.4': '^6.30.4'
  'react-router-dom@>=6.7.0 <6.30.4': '^6.30.4'
  'rollup@>=4.0.0 <4.59.0': '^4.59.0'
  'samlify@<2.13.0': '^2.13.0'
  'shell-quote@>=1.1.0 <=1.8.3': '^1.8.4'
  'tar@<=7.5.15': '^7.5.16'
  'tmp@<0.2.6': '^0.2.6'
  'uuid@<11.1.1': '^11.1.1'
  'vite@<=6.4.2': '^6.4.3'
  # Pin vite to a single exact version so dependency upgrades (`pnpm update <pkg>`)
  # cannot pull a second vite minor into the tree — a second vite changed the
  # CJS/sass interop resolution and caused build/runtime regressions. The bare
  # `vite` key forces every requested vite range to resolve to this exact version.
  vite: 8.0.16
  'ws@>=7.0.0 <7.5.11': '^7.5.11'
  'ws@>=8.0.0 <8.21.0': '^8.21.0'
  'yaml@>=2.0.0 <2.8.3': '^2.8.3'
peerDependencyRules:
  allowedVersions:
    'react': '^18.0.0'
    'jest': '^29.1.2'
    'stylelint': '^16.0.0'
